name: Build Linux binary
description: Build the application and publish the binary as an artifact.

inputs:
  project-name:
    description: Name of the final product after the build
    required: true
  libc-type:
    description: C library type for the build
    required: true
  arch-type:
    description: Architecture type for the build
    required: true

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        path: source

    - name: Build glibc application
      if: inputs.libc-type == 'glibc'
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
        ARCH_TYPE: ${{ inputs.arch-type }}
      run: |
        docker run --rm \
          --volume "${GITHUB_WORKSPACE}/source:/source:ro" \
          --volume "${GITHUB_WORKSPACE}:/out" \
          --workdir /source \
          --env PROJECT_NAME \
          --env ARCH_TYPE \
          docker.io/library/rust:1.97.0-slim-trixie \
          bash -euxo pipefail -c '
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install --yes --no-install-recommends \
              libadwaita-1-dev
            CARGO_TARGET_DIR=/tmp/drosophila-target cargo build --release --locked
            install -Dm0755 /tmp/drosophila-target/release/drosophila \
              "/out/${PROJECT_NAME}-linux-glibc-${ARCH_TYPE}"
          '

    - name: Build musl application
      if: inputs.libc-type == 'musl'
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
        ARCH_TYPE: ${{ inputs.arch-type }}
      run: |
        docker run --rm \
          --volume "${GITHUB_WORKSPACE}/source:/source:ro" \
          --volume "${GITHUB_WORKSPACE}:/out" \
          --workdir /source \
          --env PROJECT_NAME \
          --env ARCH_TYPE \
          docker.io/library/rust:1.97.0-alpine3.24 \
          sh -eux -c '
            apk add --no-cache libadwaita-dev
            RUSTFLAGS="-C target-feature=-crt-static" \
              CARGO_TARGET_DIR=/tmp/drosophila-target \
              cargo build --release --locked
            install -Dm0755 /tmp/drosophila-target/release/drosophila \
              "/out/${PROJECT_NAME}-linux-musl-${ARCH_TYPE}"
          '

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.project-name }}-linux-${{ inputs.libc-type }}-${{ inputs.arch-type }}
        path: ${{ inputs.project-name }}-linux-${{ inputs.libc-type }}-${{ inputs.arch-type }}
        if-no-files-found: error

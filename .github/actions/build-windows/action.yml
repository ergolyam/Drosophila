name: Build windows
description: Checkout and build the windows executable, then publish it to the artifacts.

inputs:
  arch-type:
    description: Architecture type for the build
    required: true

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        path: source
        fetch-depth: 0

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          mingw-w64-x86_64-adwaita-icon-theme
          mingw-w64-x86_64-gdk-pixbuf2
          mingw-w64-x86_64-gobject-introspection
          mingw-w64-x86_64-gtk4
          mingw-w64-x86_64-hicolor-icon-theme
          mingw-w64-x86_64-libadwaita
          mingw-w64-x86_64-librsvg
          mingw-w64-x86_64-pyinstaller
          mingw-w64-x86_64-pyinstaller-hooks-contrib
          mingw-w64-x86_64-python
          mingw-w64-x86_64-python-gobject
          mingw-w64-x86_64-python-pip
          mingw-w64-x86_64-python-setuptools-scm

    - name: Install 7-Zip
      shell: powershell
      run: choco install 7zip -y --no-progress

    - name: Build yggdrasil and yggstack
      uses: ./.github/actions/build-ygg
      with:
        goos: windows
        goarch: ${{ inputs.arch-type == 'aarch64' && 'arm64' || 'amd64' }}

    - name: Download Wintun
      shell: bash
      run: |
        curl.exe -fL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
        echo "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51  wintun.zip" | sha256sum -c -
        "/c/Program Files/7-Zip/7z.exe" x -y wintun.zip -owintun
        cp wintun/wintun/bin/amd64/wintun.dll source/

    - name: Prepare binaries
      shell: bash
      run: |
        cp yggdrasil/yggdrasil.exe source/
        cp yggdrasil/yggdrasilctl.exe source/
        cp yggstack/yggstack.exe source/

    - name: Build Drosophila
      working-directory: source
      shell: msys2 {0}
      run: |
        /mingw64/bin/python -m PyInstaller \
          --clean \
          --noconfirm \
          --distpath dist \
          --workpath build \
          drosophila-windows.spec

    - name: Package SFX
      shell: bash
      env:
        BUNDLE_PREFIX: Drosophila-${{ inputs.arch-type }}
      run: |
        rm -f "$ARCHIVE" "$OUTPUT"
        "/c/Program Files/7-Zip/7z.exe" a -mx=9 "${BUNDLE_PREFIX}.7z" source/dist/Drosophila
        cat "/c/Program Files/7-Zip/7z.sfx" "${ARCHIVE}.7z" > "${BUNDLE_PREFIX}.exe"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v7
      with:
        name: Drosophila-windows-${{ inputs.arch-type }}
        path: Drosophila-${{ inputs.arch-type }}.exe
        if-no-files-found: error

name: Build windows
description: Checkout and build the windows executable, then publish it to the artifacts.

inputs:
  project-name:
    description: Name of the final product after the build
    required: true
  arch-type:
    description: Architecture type for the build
    required: true

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        path: source
        fetch-depth: 0

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      env:
        MSYS2_PREFIX: ${{ inputs.arch-type == 'aarch64' && 'clang-aarch64' || 'x86_64' }}
      with:
        msystem: ${{ inputs.arch-type == 'aarch64' && 'CLANGARM64' || 'MINGW64' }}
        update: true
        install: >-
          git
          mingw-w64-${{ env.MSYS2_PREFIX }}-adwaita-icon-theme
          mingw-w64-${{ env.MSYS2_PREFIX }}-gdk-pixbuf2
          mingw-w64-${{ env.MSYS2_PREFIX }}-gobject-introspection
          mingw-w64-${{ env.MSYS2_PREFIX }}-gtk4
          mingw-w64-${{ env.MSYS2_PREFIX }}-hicolor-icon-theme
          mingw-w64-${{ env.MSYS2_PREFIX }}-libadwaita
          mingw-w64-${{ env.MSYS2_PREFIX }}-librsvg
          mingw-w64-${{ env.MSYS2_PREFIX }}-pyinstaller
          mingw-w64-${{ env.MSYS2_PREFIX }}-pyinstaller-hooks-contrib
          mingw-w64-${{ env.MSYS2_PREFIX }}-python
          mingw-w64-${{ env.MSYS2_PREFIX }}-python-gobject
          mingw-w64-${{ env.MSYS2_PREFIX }}-python-pip
          mingw-w64-${{ env.MSYS2_PREFIX }}-python-setuptools-scm

    - name: Install 7-Zip
      shell: powershell
      run: choco install 7zip -y --no-progress

    - name: Build yggdrasil and yggstack
      uses: ./.github/actions/build-ygg
      with:
        goos: windows
        goarch: ${{ inputs.arch-type == 'aarch64' && 'arm64' || 'amd64' }}

    - name: Download Wintun
      shell: bash
      env:
        ARCH: ${{ inputs.arch-type == 'aarch64' && 'arm64' || 'amd64' }}
      run: |
        curl.exe -fL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
        echo "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51  wintun.zip" | sha256sum -c -
        "/c/Program Files/7-Zip/7z.exe" x -y wintun.zip -owintun
        cp wintun/wintun/bin/${ARCH}/wintun.dll source/

    - name: Prepare binaries
      shell: bash
      run: |
        cp yggdrasil/yggdrasil.exe source/
        cp yggdrasil/yggdrasilctl.exe source/
        cp yggstack/yggstack.exe source/

    - name: Build ${{ inputs.project-name }}
      working-directory: source
      shell: msys2 {0}
      run: |
        python -m PyInstaller \
          --clean \
          --noconfirm \
          --distpath dist \
          --workpath build \
          pyinstaller-windows.spec

    - name: Package SFX
      shell: bash
      env:
        BUNDLE_PREFIX: ${{ inputs.project-name }}-${{ inputs.arch-type }}
      run: |
        "/c/Program Files/7-Zip/7z.exe" a -mx=9 "${BUNDLE_PREFIX}.7z" ./source/dist/${{ inputs.project-name }}
        cat "/c/Program Files/7-Zip/7z.sfx" "${BUNDLE_PREFIX}.7z" > "${BUNDLE_PREFIX}.exe"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.project-name }}-windows-${{ inputs.arch-type }}
        path: ${{ inputs.project-name }}-${{ inputs.arch-type }}.exe
        if-no-files-found: error

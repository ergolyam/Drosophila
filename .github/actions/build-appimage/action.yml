name: Build appimage
description: Checkout and build the AppImage, then publish it to the artifacts.

inputs:
  project-name:
    description: Name of the final product after the build
    required: true
  arch-type:
    description: Architecture type for the build
    required: true

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        path: source
        fetch-depth: 0

    - name: Build yggdrasil and yggstack
      uses: ./.github/actions/build-ygg
      with:
        goos: linux
        goarch: ${{ inputs.arch-type == 'aarch64' && 'arm64' || 'amd64' }}

    - name: Build self-contained AppImage
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
        ARCH_TYPE: ${{ inputs.arch-type }}
      run: |
        mkdir -p "$GITHUB_WORKSPACE/appimage-output"
        docker run --rm \
          -e PROJECT_NAME \
          -e ARCH_TYPE \
          -v "$GITHUB_WORKSPACE/source:/source:ro" \
          -v "$GITHUB_WORKSPACE/yggdrasil:/yggdrasil:ro" \
          -v "$GITHUB_WORKSPACE/yggstack:/yggstack:ro" \
          -v "$GITHUB_WORKSPACE/appimage-output:/output" \
          -v "$GITHUB_ACTION_PATH:/action:ro" \
          docker.io/alpine:3.22 \
          /bin/sh /action/build.sh

    - name: Test AppImage on musl and glibc distributions
      shell: bash
      env:
        APPIMAGE_NAME: ${{ inputs.project-name }}-${{ inputs.arch-type }}.AppImage
      run: |
        for image in \
          docker.io/alpine:3.22 \
          docker.io/debian:12-slim \
          docker.io/fedora:42 \
          docker.io/opensuse/tumbleweed; do
          docker run --rm \
            -e APPIMAGE_EXTRACT_AND_RUN=1 \
            -e DROSOPHILA_APPIMAGE_SMOKE_TEST=1 \
            -v "$GITHUB_WORKSPACE/appimage-output:/appimage:ro" \
            "$image" \
            "/appimage/$APPIMAGE_NAME"
        done

    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.project-name }}-appimage-${{ inputs.arch-type }}
        path: appimage-output/${{ inputs.project-name }}-${{ inputs.arch-type }}.AppImage
        if-no-files-found: error

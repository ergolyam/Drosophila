name: Build and Push Windows

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout yggdrasil
        uses: actions/checkout@v4
        with:
          repository: yggdrasil-network/yggdrasil-go
          path: yggdrasil
          ref: v0.5.13

      - name: Checkout yggstack
        uses: actions/checkout@v4
        with:
          repository: yggdrasil-network/yggstack
          path: yggstack
          ref: 1.0.5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-adwaita-icon-theme
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-gobject-introspection
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-hicolor-icon-theme
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-librsvg
            mingw-w64-x86_64-pyinstaller
            mingw-w64-x86_64-pyinstaller-hooks-contrib
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-setuptools-scm

      - name: Install 7-Zip
        run: choco install 7zip -y --no-progress

      - name: Build yggdrasil
        env:
          CGO_ENABLED: 0
          GOARCH: amd64
          GOOS: windows
        run: ./build
        shell: bash
        working-directory: yggdrasil

      - name: Build yggstack
        env:
          CGO_ENABLED: 0
          GOARCH: amd64
          GOOS: windows
        run: ./build
        shell: bash
        working-directory: yggstack

      - name: Download Wintun
        run: |
          $url = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          Invoke-WebRequest -Uri $url -OutFile wintun.zip
          $hash = (Get-FileHash wintun.zip -Algorithm SHA256).Hash.ToLower()
          if ($hash -ne "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51") {
            throw "wintun package did not match expected checksum"
          }
          Expand-Archive wintun.zip -DestinationPath wintun
          Copy-Item wintun\wintun\bin\amd64\wintun.dll .

      - name: Prepare binaries
        run: |
          Copy-Item yggdrasil\yggdrasil.exe .
          Copy-Item yggdrasil\yggdrasilctl.exe .
          Copy-Item yggstack\yggstack.exe .

      - name: Build Drosophila
        run: |
          /mingw64/bin/python -m PyInstaller \
            --clean \
            --noconfirm \
            --distpath dist \
            --workpath build \
            drosophila-windows.spec
        shell: msys2 {0}

      - name: Package SFX
        run: |
          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          $sfx = "${env:ProgramFiles}\7-Zip\7z.sfx"
          $archive = "Drosophila-windows-x86_64.7z"
          $output = "Drosophila-windows-x86_64.exe"
          Remove-Item $archive -ErrorAction SilentlyContinue
          Remove-Item $output -ErrorAction SilentlyContinue
          & $sevenZip a -mx=9 $archive .\dist\Drosophila
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $outputStream = [System.IO.File]::Create($output)
          try {
            foreach ($input in @($sfx, $archive)) {
              $inputStream = [System.IO.File]::OpenRead($input)
              try {
                $inputStream.CopyTo($outputStream)
              } finally {
                $inputStream.Dispose()
              }
            }
          } finally {
            $outputStream.Dispose()
          }

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Drosophila-windows-x86_64
          path: Drosophila-windows-x86_64.exe


  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          pattern: Drosophila-*
          path: builds
          merge-multiple: true

      - name: Rename bundles
        run: for f in Drosophila-*.exe; do mv "$f" "Drosophila-${{ github.ref_name }}-${f#Drosophila-}"; done
        working-directory: builds

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Drosophila ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: builds/Drosophila-*

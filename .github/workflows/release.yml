name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      flatpak: repo
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  publish-flatpak:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - name: Import GPG-key
        id: gpg-key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Prepare GPG-pubkey
        run: gpg --export ${{ steps.gpg-key.outputs.fingerprint }} > pubkey.gpg

      - name: Download Flatpak repos
        uses: actions/download-artifact@v8
        with:
          pattern: repo-*
          path: repos

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: old-pages
        continue-on-error: true

      - name: Merge repos into one
        run: |
          if [ -d "old-pages/repo" ]; then
            echo "Found existing repo, copying..."
            cp -r old-pages/repo .
            mkdir -p repo/refs/remotes repo/refs/mirrors
          else
            echo "No existing repo found, initializing new..."
            mkdir repo
            ostree --repo=./repo init --mode=archive-z2
          fi
          for src in ./repos/repo-*; do
            mkdir -p $src/refs/remotes $src/refs/mirrors
            ref=$(ostree refs --repo=$src)
            echo "Pulling $ref from $src..."
            ostree pull-local $src $ref --repo=./repo
          done
          flatpak build-update-repo \
            --gpg-sign=${{ steps.gpg-key.outputs.fingerprint }} \
            --gpg-import=pubkey.gpg \
            --generate-static-deltas \
            --prune \
            ./repo

      - name: Set the root of the repository
        run: |
          mkdir ./root
          mv ./repo ./root
          touch ./root/.nojekyll

      - name: Write .flatpakrepo file
        env:
          PAGES_REPO_URL: ${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          cat > ./root/${{ github.repository_owner }}.flatpakrepo << EOF
          [Flatpak Repo]
          Title=$PAGES_REPO_URL
          Url=https://$PAGES_REPO_URL/repo/
          GPGKey=$(cat pubkey.gpg | base64 --wrap=0)
          EOF

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./root
          force_orphan: true

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: Drosophila-*
          path: builds
          merge-multiple: true

      - name: Rename release assets
        run: |
          for f in Drosophila-*.AppImage Drosophila-*.exe; do
            [ -e "$f" ] || continue
            mv "$f" "Drosophila-${{ github.ref_name }}-${f#Drosophila-}"
          done
        working-directory: builds

      - name: Create release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Drosophila ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: builds/Drosophila-*

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  PROJECT_NAME: ${{ github.event.repository.name }}

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      flatpak: repo
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  publish-flatpak:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - name: Import GPG-key
        id: gpg-key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Prepare GPG-pubkey
        env:
          GPG_FINGERPRINT: ${{ steps.gpg-key.outputs.fingerprint }}
        run: gpg --export "${GPG_FINGERPRINT}" > pubkey.gpg

      - name: Download Flatpak repos
        uses: actions/download-artifact@v8
        with:
          pattern: repo-*
          path: repos

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: old-pages
        continue-on-error: true

      - name: Merge repos into one
        env:
          GPG_FINGERPRINT: ${{ steps.gpg-key.outputs.fingerprint }}
        run: |
          if [ -d "old-pages/repo" ]; then
            echo "Found existing repo, copying..."
            cp -r old-pages/repo .
            mkdir -p repo/refs/remotes repo/refs/mirrors
          else
            echo "No existing repo found, initializing new..."
            mkdir repo
            ostree --repo=./repo init --mode=archive-z2
          fi
          for source_repo in ./repos/repo-*; do
            mkdir -p ${source_repo}/refs/remotes ${source_repo}/refs/mirrors
            repository_ref=$(ostree refs --repo=${source_repo})
            echo "Pulling ${repository_ref} from ${source_repo}..."
            ostree pull-local ${source_repo} ${repository_ref} --repo=./repo
          done
          flatpak build-update-repo \
            --gpg-sign="${GPG_FINGERPRINT}" \
            --gpg-import=pubkey.gpg \
            --generate-static-deltas \
            --prune \
            ./repo

      - name: Set the root of the repository
        run: |
          mkdir ./root
          mv ./repo ./root
          touch ./root/.nojekyll

      - name: Write .flatpakrepo file
        run: |
          PAGES_REPO_URL="${GITHUB_REPOSITORY_OWNER}.github.io/${PROJECT_NAME}"
          cat > "./root/${GITHUB_REPOSITORY_OWNER}.flatpakrepo" << EOF
          [Flatpak Repo]
          Title=${PAGES_REPO_URL}
          Url=https://${PAGES_REPO_URL}/repo/
          GPGKey=$(cat pubkey.gpg | base64 --wrap=0)
          EOF

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./root
          force_orphan: true

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ env.PROJECT_NAME }}-*
          path: builds
          merge-multiple: true

      - name: Rename release assets
        working-directory: builds
        run: |
          for asset in "${PROJECT_NAME}"-*; do
            [ -e "${asset}" ] || continue
            mv "${asset}" "${PROJECT_NAME}-${GITHUB_REF_NAME}-${asset#${PROJECT_NAME}-}"
          done

      - name: Create release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.PROJECT_NAME }} ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: builds/${{ env.PROJECT_NAME }}-*

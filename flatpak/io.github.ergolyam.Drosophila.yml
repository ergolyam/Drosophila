app-id: io.github.ergolyam.Drosophila
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: drosophila

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  # Direct dconf access is required because the Settings portal is read-only.
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  - --env=GIO_EXTRA_MODULES=/app/lib/gio/modules
  - --env=GSETTINGS_BACKEND=dconf

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/drosophila/cargo

modules:
  - name: dconf
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - -Dbash_completion=false
      - -Dman=false
      - -Dvapi=false
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /lib/systemd
      - /libexec
      - /share/dbus-1
      - /share/systemd
    sources:
      - type: archive
        url: https://download.gnome.org/sources/dconf/0.49/dconf-0.49.0.tar.xz
        sha256: 16a47e49a58156dbb96578e1708325299e4c19eea9be128d5bd12fd0963d6c36
        x-checker-data:
          type: gnome
          name: dconf
          stable-only: true
      # Fedora's Flatpak-specific downstream patch, also used by current
      # Flathub manifests such as Carburetor, Brave, Chrome, and Dconf Editor.
      # https://src.fedoraproject.org/rpms/dconf
      - type: patch
        path: dconf-user-config-dir.patch

  - name: drosophila
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --locked --no-default-features
      - install -Dm755 target/release/drosophila /app/bin/drosophila
      - install -Dm644 license /app/share/licenses/io.github.ergolyam.Drosophila/COPYING
      - install -Dm644 xdg/io.github.ergolyam.Drosophila.svg /app/share/icons/hicolor/scalable/apps/io.github.ergolyam.Drosophila.svg
      - install -Dm644 xdg/io.github.ergolyam.Drosophila.desktop /app/share/applications/io.github.ergolyam.Drosophila.desktop
      - install -Dm644 xdg/io.github.ergolyam.Drosophila.metainfo.xml /app/share/metainfo/io.github.ergolyam.Drosophila.metainfo.xml
    sources:
      - type: dir
        path: ..
      - cargo-sources.json
